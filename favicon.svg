<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark cherry background, rounded corners -->
  <rect width="100" height="100" rx="15" ry="15" fill="#2B0A1E"/>

  <!--
    Perfect 5-pointed star, mathematically centered at (50, 50).
    Outer radius R = 38, Inner radius r = 38 * tan(π/10) / tan(3π/10) ≈ 15.2
    Angles: outer tips at -90°, -18°, 54°, 126°, 198°
             inner notches at -54°, 18°, 90°, 162°, 234°
  -->
  <polygon
    points="
      50.00,12.00
      61.76,35.09
      87.27,38.82
      68.64,56.98
      73.11,82.38
      50.00,70.00
      26.89,82.38
      31.36,56.98
      12.73,38.82
      38.24,35.09
    "
    fill="#E95E7C"
  />

  <!-- Bold 'C' mathematically anchored at star center (50, 50) -->
  <text
    x="50"
    y="50"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="26"
    font-weight="900"
    fill="#2B0A1E"
  >C</text>
</svg>
